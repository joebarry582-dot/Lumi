<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCraft · Visual Builder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- CSS VARIABLES (Light Mode) ----- */
    :root {
      --bg-app: #f5f7fb;
      --bg-panel: #ffffff;
      --border-light: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --primary: #5a67d8;
      --primary-light: #eef2ff;
      --canvas-bg: rgba(255, 255, 255, 0.85);  /* semi-transparent to show floating blocks */
      --canvas-solid: #ffffff;
      --canvas-text: #1e293b;
      --shadow: 0 8px 20px rgba(0,0,0,0.04);
      --hover-outline: #a0aec0;
      --block-color: rgba(200, 200, 210, 0.25);
    }

    .dark-mode {
      --bg-app: #0f172a;
      --bg-panel: #1e293b;
      --border-light: #334155;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #818cf8;
      --primary-light: #312e81;
      --canvas-bg: rgba(30, 41, 59, 0.85);
      --canvas-solid: #1e293b;
      --canvas-text: #f1f5f9;
      --shadow: 0 8px 20px rgba(0,0,0,0.3);
      --hover-outline: #64748b;
      --block-color: rgba(100, 116, 139, 0.2);
    }

    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-app);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    /* ----- LAYOUT ----- */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .top-bar {
      background: var(--bg-panel);
      padding: 0.8rem 1.8rem;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .logo { font-weight: 700; font-size: 1.4rem; color: var(--primary); letter-spacing: -0.5px; }
    .top-actions { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 0.5rem 1.1rem; border-radius: 30px; border: 1px solid var(--border-light); background: var(--bg-panel); color: var(--text-main); font-weight: 500; cursor: pointer; transition: 0.15s; display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; }
    .btn-primary { background: var(--primary); color: white; border: none; }
    .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
    .responsive-toggles { display: flex; margin: 0 8px; }
    .preview-btn { padding: 6px 12px; border: 1px solid var(--border-light); background: var(--bg-panel); color: var(--text-main); cursor: pointer; }
    .preview-btn.active { background: var(--primary); color: white; }

    .main-layout { display: flex; flex: 1; overflow: hidden; }

    /* Left panel */
    .left-panel {
      width: 270px; background: var(--bg-panel); border-right: 1px solid var(--border-light);
      padding: 1.2rem 1rem; overflow-y: auto; color: var(--text-main);
    }
    .panel-header h3 { margin-bottom: 8px; }
    .hint { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 16px; }
    .elements-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .element-card {
      background: var(--bg-panel); border: 1px dashed var(--border-light); border-radius: 12px;
      padding: 12px 6px; text-align: center; font-size: 0.85rem; cursor: grab;
      transition: all 0.15s; user-select: none; color: var(--text-main);
    }
    .element-card:hover { background: var(--primary-light); border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
    .templates-section { margin-top: 28px; }
    .template-btn { width: 100%; margin-bottom: 8px; padding: 10px; border-radius: 24px; border: 1px solid var(--border-light); background: var(--bg-panel); color: var(--text-main); cursor: pointer; transition: 0.1s; }
    .template-btn:hover { background: var(--primary-light); }

    /* Canvas wrapper with floating blocks */
    .canvas-wrapper {
      flex: 1;
      background: var(--canvas-solid);
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: auto;
      position: relative;
      isolation: isolate;
    }

    /* Floating blocks container */
    .floating-blocks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-block {
      position: absolute;
      background: var(--block-color);
      border-radius: 24px;
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.02);
      animation: floatBlock 18s infinite ease-in-out;
    }

    @keyframes floatBlock {
      0% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -40px) rotate(3deg); }
      66% { transform: translate(-20px, 20px) rotate(-2deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    /* Individual block sizes and delays */
    .floating-block:nth-child(1) { width: 180px; height: 180px; top: 10%; left: 5%; animation-duration: 22s; }
    .floating-block:nth-child(2) { width: 120px; height: 120px; top: 60%; left: 80%; animation-duration: 25s; animation-delay: -5s; }
    .floating-block:nth-child(3) { width: 200px; height: 140px; top: 75%; left: 15%; animation-duration: 20s; animation-delay: -2s; }
    .floating-block:nth-child(4) { width: 100px; height: 100px; top: 20%; left: 70%; animation-duration: 30s; }
    .floating-block:nth-child(5) { width: 160px; height: 160px; top: 45%; left: 40%; animation-duration: 28s; animation-delay: -10s; }
    .floating-block:nth-child(6) { width: 140px; height: 90px; top: 5%; left: 90%; animation-duration: 19s; }
    .floating-block:nth-child(7) { width: 220px; height: 100px; top: 85%; left: 60%; animation-duration: 24s; }

    .canvas-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--text-main);
      position: relative;
      z-index: 3;
    }
    .empty-hint { color: var(--text-muted); font-style: italic; }
    .canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      transition: max-width 0.2s;
      position: relative;
      z-index: 3;
    }
    .website-canvas {
      background: var(--canvas-bg);
      backdrop-filter: blur(4px);
      color: var(--canvas-text);
      min-height: 100%;
      width: 100%;
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      outline: 2px solid transparent;
      transition: background 0.2s, color 0.2s;
    }
    .canvas-container.desktop .website-canvas { max-width: 100%; }
    .canvas-container.tablet .website-canvas { max-width: 768px; margin: 0 auto; }
    .canvas-container.mobile .website-canvas { max-width: 375px; margin: 0 auto; }

    .canvas-element {
      position: relative; margin: 8px 0; transition: box-shadow 0.1s, outline 0.1s;
    }
    .canvas-element:hover {
      outline: 1px dashed var(--hover-outline);
      outline-offset: 2px;
    }
    .canvas-element.selected {
      outline: 2px solid var(--primary) !important;
      outline-offset: 2px;
    }
    [contenteditable="true"]:focus {
      outline: 2px dashed #3b82f6; background: rgba(59,130,246,0.05);
    }

    /* Right panel */
    .right-panel { width: 310px; background: var(--bg-panel); border-left: 1px solid var(--border-light); display: flex; flex-direction: column; color: var(--text-main); }
    .panel-tabs { display: flex; border-bottom: 1px solid var(--border-light); }
    .tab-btn { flex: 1; padding: 12px 4px; background: transparent; border: none; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.1s; }
    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .panel-content { flex: 1; padding: 18px; overflow-y: auto; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .prop-group { margin-bottom: 18px; }
    .prop-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
    .prop-group input, .prop-group select, .prop-group textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border-light); border-radius: 12px; font-size: 0.9rem;
      background: var(--bg-panel); color: var(--text-main);
    }
    .small-btn { padding: 6px 10px; margin-top: 6px; width: 100%; }
    .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .checkbox-group input { width: auto; }

    /* Modal */
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--bg-panel); color: var(--text-main); padding: 24px; border-radius: 24px; width: 700px; max-width: 90%; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    #themeToggle { background: transparent; border: 1px solid var(--border-light); border-radius: 30px; padding: 8px 12px; }
  </style>
</head>
<body>
<div class="app">
  <header class="top-bar">
    <div class="logo">🎨 WebCraft</div>
    <div class="top-actions">
      <button class="btn btn-outline" id="themeToggle" title="Toggle light/dark mode">
        <i class="fas fa-moon"></i><span> Dark</span>
      </button>
      <button class="btn btn-outline" id="undoBtn"><i class="fas fa-undo-alt"></i></button>
      <button class="btn btn-outline" id="redoBtn"><i class="fas fa-redo-alt"></i></button>
      <div class="responsive-toggles">
        <button class="preview-btn active" data-device="desktop"><i class="fas fa-desktop"></i></button>
        <button class="preview-btn" data-device="tablet"><i class="fas fa-tablet-alt"></i></button>
        <button class="preview-btn" data-device="mobile"><i class="fas fa-mobile-alt"></i></button>
      </div>
      <button class="btn btn-outline" id="saveBtn"><i class="fas fa-save"></i> Save</button>
      <button class="btn btn-outline" id="loadBtn"><i class="fas fa-folder-open"></i> Load</button>
      <button class="btn btn-primary" id="exportBtn"><i class="fas fa-code"></i> Export</button>
    </div>
  </header>

  <div class="main-layout">
    <!-- LEFT PANEL (same) -->
    <aside class="left-panel">
      <div class="panel-header"><h3>➕ Elements</h3><p class="hint">Drag & drop onto canvas</p></div>
      <div class="elements-grid" id="elementsLibrary">
        <div class="element-card" data-type="heading" draggable="true"><i class="fas fa-heading"></i> Heading</div>
        <div class="element-card" data-type="paragraph" draggable="true"><i class="fas fa-paragraph"></i> Paragraph</div>
        <div class="element-card" data-type="image" draggable="true"><i class="fas fa-image"></i> Image</div>
        <div class="element-card" data-type="button" draggable="true"><i class="fas fa-square"></i> Button</div>
        <div class="element-card" data-type="divider" draggable="true"><i class="fas fa-minus"></i> Divider</div>
        <div class="element-card" data-type="container" draggable="true"><i class="fas fa-square"></i> Container</div>
        <div class="element-card" data-type="card" draggable="true"><i class="fas fa-id-card"></i> Card</div>
        <div class="element-card" data-type="navbar" draggable="true"><i class="fas fa-bars"></i> Navbar</div>
        <div class="element-card" data-type="footer" draggable="true"><i class="fas fa-shoe-prints"></i> Footer</div>
        <div class="element-card" data-type="grid" draggable="true"><i class="fas fa-th"></i> Grid</div>
      </div>
      <div class="templates-section">
        <h4>📦 Templates</h4>
        <button class="template-btn" data-template="landing">Landing page</button>
        <button class="template-btn" data-template="portfolio">Portfolio</button>
        <button class="template-btn" data-template="blog">Simple blog</button>
      </div>
    </aside>

    <!-- CANVAS with floating blocks -->
    <main class="canvas-wrapper">
      <!-- Floating background blocks -->
      <div class="floating-blocks">
        <div class="floating-block"></div>
        <div class="floating-block"></div>
        <div class="floating-block"></div>
        <div class="floating-block"></div>
        <div class="floating-block"></div>
        <div class="floating-block"></div>
        <div class="floating-block"></div>
      </div>
      <div class="canvas-header">
        <span class="selected-info" id="selectedInfo">Click any element to edit</span>
        <span class="empty-hint" id="emptyHint">✨ Drop elements here</span>
      </div>
      <div class="canvas-container desktop" id="canvasContainer">
        <div class="website-canvas" id="canvas" dropzone="move"></div>
      </div>
    </main>

    <!-- RIGHT PANEL (with image resizing) -->
    <aside class="right-panel">
      <div class="panel-tabs">
        <button class="tab-btn active" data-tab="content">Content</button>
        <button class="tab-btn" data-tab="style">Style</button>
        <button class="tab-btn" data-tab="layout">Layout</button>
        <button class="tab-btn" data-tab="advanced">Advanced</button>
      </div>
      <div class="panel-content" id="panelContent">
        <!-- Content Tab -->
        <div class="tab-pane active" id="tab-content">
          <div class="prop-group"><label>Text</label><input type="text" id="contentText" placeholder="Edit content"></div>
          
          <div id="imageControls" style="display:none;">
            <div class="prop-group"><label>Image URL</label><input type="text" id="imageUrl" placeholder="https://..."></div>
            <div class="prop-group"><label>Width</label><input type="text" id="imageWidth" placeholder="e.g., 300px or 100%"></div>
            <div class="prop-group"><label>Height</label><input type="text" id="imageHeight" placeholder="auto"></div>
            <div class="checkbox-group">
              <input type="checkbox" id="lockAspect"> <label for="lockAspect">Lock aspect ratio</label>
            </div>
            <button class="btn btn-outline small-btn" id="applyImageBtn">Apply Image & Size</button>
          </div>
          
          <div class="prop-group" id="buttonLabelGroup" style="display:none;"><label>Button label</label><input type="text" id="buttonLabel"></div>
        </div>
        <!-- Style Tab -->
        <div class="tab-pane" id="tab-style">
          <div class="prop-group"><label>Font family</label><select id="fontFamily"><option value="">Default</option><option value="Arial">Arial</option><option value="Georgia">Georgia</option><option value="'Segoe UI'">Segoe UI</option></select></div>
          <div class="prop-group"><label>Font size</label><input type="text" id="fontSize" placeholder="16px"></div>
          <div class="prop-group"><label>Text color</label><input type="color" id="textColor"></div>
          <div class="prop-group"><label>Background</label><input type="color" id="bgColor"><input type="text" id="bgGradient" placeholder="linear-gradient(...)"></div>
          <div class="prop-group"><label>Border radius</label><input type="text" id="borderRadius" placeholder="8px"></div>
          <div class="prop-group"><label>Box shadow</label><input type="text" id="boxShadow" placeholder="0 4px 6px rgba(0,0,0,0.1)"></div>
          <div class="prop-group"><label>Text align</label><select id="textAlign"><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select></div>
        </div>
        <!-- Layout Tab -->
        <div class="tab-pane" id="tab-layout">
          <div class="prop-group"><label>Margin (px)</label><input type="text" id="margin" placeholder="10"></div>
          <div class="prop-group"><label>Padding (px)</label><input type="text" id="padding" placeholder="15"></div>
          <div class="prop-group"><label>Width</label><input type="text" id="width" placeholder="auto"></div>
          <div class="prop-group"><label>Height</label><input type="text" id="height" placeholder="auto"></div>
          <div class="prop-group"><label>Flex align</label><select id="flexAlign"><option value="flex-start">Start</option><option value="center">Center</option><option value="flex-end">End</option></select></div>
        </div>
        <!-- Advanced Tab -->
        <div class="tab-pane" id="tab-advanced">
          <div class="prop-group"><label>Custom CSS</label><textarea id="customCss" rows="3"></textarea></div>
          <div class="prop-group"><label>Visibility</label><select id="visibility"><option value="visible">Visible</option><option value="hidden">Hidden</option></select></div>
          <button class="btn btn-outline" id="duplicateBtn"><i class="fas fa-copy"></i> Duplicate</button>
          <button class="btn btn-outline" id="deleteBtn" style="color:#b91c1c;"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<!-- Export Modal -->
<div class="modal" id="exportModal">
  <div class="modal-content">
    <h3>📄 Export HTML + CSS</h3>
    <textarea id="exportCode" rows="14" readonly style="width:100%; font-family: monospace; background: var(--bg-panel); color: var(--text-main);"></textarea>
    <div class="modal-actions">
      <button class="btn btn-primary" id="copyCodeBtn"><i class="fas fa-copy"></i> Copy</button>
      <button class="btn btn-outline" id="downloadBtn"><i class="fas fa-download"></i> Download</button>
      <button class="btn btn-outline" id="closeModalBtn">Close</button>
    </div>
  </div>
</div>

<script>
  // The JavaScript remains unchanged from the previous working version.
  // It includes all features: drag/drop, undo/redo, style editing, image resizing, dark mode, templates, save/load, export.
  (function(){
    "use strict";
    let elements = [];
    let selectedIndex = -1;
    let historyStack = [];
    let historyIndex = -1;
    const MAX_HISTORY = 50;

    const defaultTemplates = {
      heading: { tag:'h2', content:'Your Heading', styles:{ fontSize:'32px', fontWeight:'bold' } },
      paragraph: { tag:'p', content:'Lorem ipsum dolor sit amet.', styles:{} },
      image: { tag:'img', src:'https://placehold.co/600x400/e2e8f0/1e293b?text=Image', styles:{ maxWidth:'100%' } },
      button: { tag:'button', content:'Click me', styles:{ padding:'12px 24px', background:'#5a67d8', color:'white', border:'none', borderRadius:'40px', cursor:'pointer' } },
      divider: { tag:'hr', styles:{ margin:'20px 0' } },
      container: { tag:'div', content:'', styles:{ padding:'20px', background:'#f1f5f9', borderRadius:'16px' } },
      card: { tag:'div', content:'<img src="https://placehold.co/300x180" style="width:100%;border-radius:12px"/><h3>Card Title</h3><p>Description</p>', styles:{ padding:'16px', background:'white', borderRadius:'20px', boxShadow:'0 4px 12px rgba(0,0,0,0.05)' } },
      navbar: { tag:'nav', content:'Home | About | Contact', styles:{ display:'flex', gap:'24px', padding:'16px', background:'#fff', borderBottom:'1px solid #e2e8f0' } },
      footer: { tag:'footer', content:'© 2026 WebCraft', styles:{ padding:'24px', textAlign:'center', background:'#f8fafc' } },
      grid: { tag:'div', content:'<div>Item 1</div><div>Item 2</div><div>Item 3</div>', styles:{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'16px' } }
    };

    const canvas = document.getElementById('canvas');
    const canvasContainer = document.getElementById('canvasContainer');
    const emptyHint = document.getElementById('emptyHint');
    const selectedInfo = document.getElementById('selectedInfo');

    function genId() { return 'el_' + Date.now() + '_' + Math.random().toString(36); }

    function renderCanvas() {
      canvas.innerHTML = '';
      if (elements.length === 0) {
        emptyHint.style.display = 'block';
      } else {
        emptyHint.style.display = 'none';
        elements.forEach((el, idx) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'canvas-element';
          wrapper.dataset.index = idx;
          wrapper.dataset.type = el.type;
          wrapper.setAttribute('draggable', 'true');
          
          let inner;
          if (el.type === 'image') {
            inner = document.createElement('img');
            inner.src = el.src || defaultTemplates.image.src;
            inner.alt = 'image';
          } else {
            inner = document.createElement(el.tag || 'div');
            if (el.type === 'heading' || el.type === 'paragraph' || el.type === 'button') {
              inner.textContent = el.content || '';
              inner.setAttribute('contenteditable', 'true');
            } else if (el.content !== undefined) {
              inner.innerHTML = el.content;
            }
          }
          
          const styles = el.styles || {};
          Object.entries(styles).forEach(([prop, val]) => { if(val) inner.style[prop] = val; });
          if (el.customCss) inner.style.cssText += ';' + el.customCss;
          if (el.visibility === 'hidden') inner.style.display = 'none';
          
          wrapper.appendChild(inner);
          
          wrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            selectElement(idx);
          });
          
          if (inner.contentEditable === 'true') {
            inner.addEventListener('input', () => {
              elements[idx].content = inner.textContent;
              pushHistory();
            });
          }
          
          wrapper.addEventListener('dragstart', handleDragStart);
          wrapper.addEventListener('dragend', (e) => e.target.style.opacity = '');
          
          canvas.appendChild(wrapper);
        });
      }
      if (selectedIndex >= 0 && canvas.children[selectedIndex]) {
        canvas.children[selectedIndex].classList.add('selected');
      }
      updateSelectedInfo();
    }

    function selectElement(index) {
      if (index < 0 || index >= elements.length) return;
      selectedIndex = index;
      renderCanvas();
      populateStylePanel(elements[index]);
    }

    function populateStylePanel(el) {
      const isImage = el.type === 'image';
      document.getElementById('imageControls').style.display = isImage ? 'block' : 'none';
      document.getElementById('buttonLabelGroup').style.display = el.type === 'button' ? 'block' : 'none';
      document.getElementById('contentText').style.display = (el.type === 'heading'||el.type==='paragraph'||el.type==='button') ? 'block' : 'none';
      
      document.getElementById('contentText').value = el.content || '';
      if (isImage) {
        document.getElementById('imageUrl').value = el.src || '';
        const s = el.styles || {};
        document.getElementById('imageWidth').value = s.width || '';
        document.getElementById('imageHeight').value = s.height || '';
      }
      document.getElementById('buttonLabel').value = el.content || '';
      
      const s = el.styles || {};
      document.getElementById('fontFamily').value = s.fontFamily || '';
      document.getElementById('fontSize').value = s.fontSize || '';
      document.getElementById('textColor').value = s.color || '#000000';
      document.getElementById('bgColor').value = s.backgroundColor || '#ffffff';
      document.getElementById('bgGradient').value = s.background || '';
      document.getElementById('borderRadius').value = s.borderRadius || '';
      document.getElementById('boxShadow').value = s.boxShadow || '';
      document.getElementById('textAlign').value = s.textAlign || 'left';
      document.getElementById('margin').value = s.margin || '';
      document.getElementById('padding').value = s.padding || '';
      document.getElementById('width').value = s.width || '';
      document.getElementById('height').value = s.height || '';
      document.getElementById('flexAlign').value = s.justifyContent || 'flex-start';
      document.getElementById('customCss').value = el.customCss || '';
      document.getElementById('visibility').value = el.visibility || 'visible';
    }

    function updateSelectedInfo() {
      if (selectedIndex >= 0 && elements[selectedIndex]) 
        selectedInfo.textContent = `✏️ Editing: ${elements[selectedIndex].type}`;
      else selectedInfo.textContent = 'Click any element to edit';
    }

    function handleDragStart(e) {
      const wrapper = e.target.closest('.canvas-element');
      if (wrapper) {
        e.dataTransfer.setData('text/plain', `reorder:${wrapper.dataset.index}`);
      } else {
        const type = e.target.dataset.type;
        if (type) e.dataTransfer.setData('text/plain', `new:${type}`);
      }
      e.target.style.opacity = '0.5';
    }

    canvas.addEventListener('dragover', (e) => e.preventDefault());
    canvas.addEventListener('drop', (e) => {
      e.preventDefault();
      const data = e.dataTransfer.getData('text/plain');
      if (!data) return;
      if (data.startsWith('new:')) {
        addElement(data.split(':')[1]);
      } else if (data.startsWith('reorder:')) {
        const fromIdx = parseInt(data.split(':')[1]);
        const children = [...canvas.children];
        let targetIdx = elements.length;
        const dropY = e.clientY;
        for (let i=0; i<children.length; i++) {
          const rect = children[i].getBoundingClientRect();
          if (dropY < rect.top + rect.height/2) { targetIdx = i; break; }
        }
        if (fromIdx !== targetIdx) {
          const [moved] = elements.splice(fromIdx, 1);
          elements.splice(targetIdx, 0, moved);
          pushHistory();
          renderCanvas();
        }
      }
    });

    function addElement(type) {
      const tpl = defaultTemplates[type] || defaultTemplates.container;
      const newEl = {
        id: genId(),
        type,
        tag: tpl.tag,
        content: tpl.content || '',
        src: tpl.src,
        styles: { ...tpl.styles }
      };
      elements.push(newEl);
      pushHistory();
      renderCanvas();
      selectElement(elements.length - 1);
    }

    function pushHistory() {
      const snapshot = JSON.parse(JSON.stringify(elements));
      historyStack = historyStack.slice(0, historyIndex + 1);
      historyStack.push(snapshot);
      if (historyStack.length > MAX_HISTORY) historyStack.shift();
      historyIndex = historyStack.length - 1;
    }

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        elements = JSON.parse(JSON.stringify(historyStack[historyIndex]));
        renderCanvas();
        selectedIndex = -1;
      }
    }
    function redo() {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        elements = JSON.parse(JSON.stringify(historyStack[historyIndex]));
        renderCanvas();
        selectedIndex = -1;
      }
    }

    function attachEvents() {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', (e) => {
        const tab = e.target.dataset.tab;
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        e.target.classList.add('active');
      }));

      document.getElementById('contentText').addEventListener('input', (e) => updateSelected('content', e.target.value));
      document.getElementById('buttonLabel').addEventListener('input', (e) => updateSelected('content', e.target.value));
      
      document.getElementById('applyImageBtn').addEventListener('click', () => {
        if (selectedIndex < 0 || elements[selectedIndex].type !== 'image') return;
        const el = elements[selectedIndex];
        el.src = document.getElementById('imageUrl').value;
        if (!el.styles) el.styles = {};
        const widthVal = document.getElementById('imageWidth').value;
        const heightVal = document.getElementById('imageHeight').value;
        if (widthVal) el.styles.width = widthVal;
        else delete el.styles.width;
        if (heightVal) el.styles.height = heightVal;
        else delete el.styles.height;
        pushHistory();
        renderCanvas();
      });

      const styleIds = ['fontFamily','fontSize','textColor','bgColor','bgGradient','borderRadius','boxShadow','textAlign','margin','padding','width','height','flexAlign','customCss','visibility'];
      styleIds.forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
          if (selectedIndex < 0) return;
          const el = elements[selectedIndex];
          if (id === 'customCss') el.customCss = e.target.value;
          else if (id === 'visibility') el.visibility = e.target.value;
          else {
            if (!el.styles) el.styles = {};
            let prop = id;
            if (id === 'textColor') prop = 'color';
            else if (id === 'bgColor') prop = 'backgroundColor';
            else if (id === 'bgGradient') prop = 'background';
            else if (id === 'flexAlign') prop = 'justifyContent';
            el.styles[prop] = e.target.value;
          }
          renderCanvas();
          pushHistory();
        });
      });

      document.getElementById('undoBtn').addEventListener('click', undo);
      document.getElementById('redoBtn').addEventListener('click', redo);
      document.getElementById('saveBtn').addEventListener('click', () => { localStorage.setItem('webcraft_save', JSON.stringify(elements)); alert('Saved!'); });
      document.getElementById('loadBtn').addEventListener('click', () => {
        const saved = localStorage.getItem('webcraft_save');
        if (saved) { elements = JSON.parse(saved); pushHistory(); renderCanvas(); selectedIndex=-1; }
      });
      document.getElementById('deleteBtn').addEventListener('click', () => {
        if (selectedIndex>=0) { elements.splice(selectedIndex,1); pushHistory(); renderCanvas(); selectedIndex=-1; }
      });
      document.getElementById('duplicateBtn').addEventListener('click', () => {
        if (selectedIndex>=0) {
          const clone = JSON.parse(JSON.stringify(elements[selectedIndex]));
          clone.id = genId();
          elements.splice(selectedIndex+1, 0, clone);
          pushHistory(); renderCanvas();
        }
      });

      document.querySelectorAll('.preview-btn').forEach(b => b.addEventListener('click', (e) => {
        document.querySelectorAll('.preview-btn').forEach(bb => bb.classList.remove('active'));
        e.currentTarget.classList.add('active');
        canvasContainer.className = 'canvas-container ' + e.currentTarget.dataset.device;
      }));

      document.querySelectorAll('.template-btn').forEach(btn => btn.addEventListener('click', (e) => {
        const tpl = e.target.dataset.template;
        if (tpl === 'landing') elements = [
          { ...defaultTemplates.heading, content:'Build Something Great', id:genId() },
          { ...defaultTemplates.button, content:'Get Started', id:genId() },
          { ...defaultTemplates.container, id:genId() }
        ];
        else if (tpl === 'portfolio') elements = [
          { ...defaultTemplates.heading, content:'My Portfolio', id:genId() },
          { ...defaultTemplates.grid, id:genId() }
        ];
        else elements = [
          { ...defaultTemplates.heading, content:'Blog Post', id:genId() },
          { ...defaultTemplates.paragraph, id:genId() }
        ];
        pushHistory(); renderCanvas(); selectedIndex=-1;
      }));

      document.getElementById('exportBtn').addEventListener('click', () => {
        let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;padding:20px;background:${getComputedStyle(document.body).getPropertyValue('--canvas-bg')};color:${getComputedStyle(document.body).getPropertyValue('--canvas-text')};}</style></head><body>`;
        elements.forEach(el => {
          const styles = el.styles ? Object.entries(el.styles).map(([k,v])=>`${k}:${v}`).join(';') : '';
          if (el.type==='image') html += `<img src="${el.src}" style="${styles}">`;
          else html += `<${el.tag} style="${styles}">${el.content||''}</${el.tag}>`;
        });
        html += `</body></html>`;
        document.getElementById('exportCode').value = html;
        document.getElementById('exportModal').style.display = 'flex';
      });
      document.getElementById('copyCodeBtn').addEventListener('click', () => {
        navigator.clipboard?.writeText(document.getElementById('exportCode').value);
        alert('Copied!');
      });
      document.getElementById('downloadBtn').addEventListener('click', () => {
        const blob = new Blob([document.getElementById('exportCode').value], {type:'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'page.html'; a.click();
      });
      document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('exportModal').style.display='none');
      
      document.querySelectorAll('[draggable]').forEach(el => el.addEventListener('dragstart', handleDragStart));

      const themeBtn = document.getElementById('themeToggle');
      const icon = themeBtn.querySelector('i');
      const span = themeBtn.querySelector('span');
      themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        span.textContent = isDark ? ' Light' : ' Dark';
        renderCanvas();
      });
    }

    function updateSelected(prop, val) {
      if (selectedIndex>=0) { elements[selectedIndex][prop] = val; pushHistory(); renderCanvas(); }
    }

    function init() {
      const saved = localStorage.getItem('webcraft_save');
      if (saved) elements = JSON.parse(saved);
      else {
        elements = [
          { ...defaultTemplates.heading, id: genId(), content: 'Welcome to WebCraft' },
          { ...defaultTemplates.paragraph, id: genId() }
        ];
      }
      pushHistory();
      renderCanvas();
      attachEvents();
    }

    init();
  })();
</script>
</body>
</html>
